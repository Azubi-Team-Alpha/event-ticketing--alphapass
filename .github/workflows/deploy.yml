name: AlphaPass CI/CD Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── STAGE 1: AUTOMATED UNIT & INTEGRATION TESTING ───────────────────────────
  test:
    name:  Run Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Execute pytest Suite
        run: |
          cd backend
          pytest -v

  # ── STAGE 2: BUILD & PACKAGE LAMBDA ARTIFACT ─────────────────────────────────
  package:
    name:  Package Backend Dependencies
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Production Dependencies into Backend
        run: |
          pip install --target backend/ -r backend/requirements.txt --platform manylinux2014_x86_64 --only-binary=:all: --implementation cp --python-version 3.12 --upgrade

      - name: Cache Packaged Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-backend
          path: backend/
          retention-days: 1

  # ── STAGE 3: INFRASTRUCTURE & FRONTEND DEPLOYMENT ──────────────────────────
  deploy:
    name:  Deploy Infrastructure & Frontend (AWS)
    needs: [test, package]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Packaged Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: packaged-backend
          path: backend/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Pre-Deploy Infrastructure Sanitation (Purge Conflicting Orphaned Resources)
        run: |
          echo "=== Pre-Deploy Infrastructure Sanitation ==="
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          ENV="dev"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || true)
          
          # Purge S3 bucket if it exists prior to fresh deployment (prevents BucketAlreadyExists)
          BUCKET_NAME="alphapass-frontend-${ENV}"
          if aws s3api head-bucket --bucket "$BUCKET_NAME" --region "$REGION" 2>/dev/null; then
            echo "Found existing S3 bucket $BUCKET_NAME prior to deployment. Clearing..."
            aws s3 rm "s3://$BUCKET_NAME" --recursive 2>/dev/null || true
            
            VERSIONS=$(aws s3api list-object-versions --bucket "$BUCKET_NAME" --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' --output json 2>/dev/null || true)
            if [ -n "$VERSIONS" ] && [ "$VERSIONS" != '{"Objects": null}' ] && [ "$VERSIONS" != '{"Objects": []}' ]; then
              aws s3api delete-objects --bucket "$BUCKET_NAME" --delete "$VERSIONS" 2>/dev/null || true
            fi

            MARKERS=$(aws s3api list-object-versions --bucket "$BUCKET_NAME" --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' --output json 2>/dev/null || true)
            if [ -n "$MARKERS" ] && [ "$MARKERS" != '{"Objects": null}' ] && [ "$MARKERS" != '{"Objects": []}' ]; then
              aws s3api delete-objects --bucket "$BUCKET_NAME" --delete "$MARKERS" 2>/dev/null || true
            fi

            aws s3api delete-bucket --bucket "$BUCKET_NAME" --region "$REGION" 2>/dev/null || true
          fi

          # Delete AWS Budget if it exists prior to fresh deployment (prevents DuplicateRecordException)
          BUDGET_NAME="alphapass-free-tier-budget-${ENV}"
          if [ -n "$ACCOUNT_ID" ]; then
            if aws budgets describe-budget --account-id "$ACCOUNT_ID" --budget-name "$BUDGET_NAME" 2>/dev/null; then
              echo "Found existing AWS Budget $BUDGET_NAME prior to deployment. Clearing..."
              aws budgets delete-budget --account-id "$ACCOUNT_ID" --budget-name "$BUDGET_NAME" 2>/dev/null || true
            fi
          fi

      - name: Setup HashiCorp Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          cd infra
          terraform init

      - name: Terraform Plan
        run: |
          cd infra
          terraform plan -var="environment=dev" -var="secret_key=${{ secrets.SECRET_KEY }}"

      - name: Terraform Apply (Provision Infrastructure & Package Backend)
        run: |
          cd infra
          terraform apply -var="environment=dev" -var="secret_key=${{ secrets.SECRET_KEY }}" -auto-approve

      - name: Deploy Backend Application Code to AWS Lambda Function
        run: |
          cd infra
          LAMBDA_NAME=$(terraform output -raw lambda_function_name)
          echo "Updating backend code on AWS Lambda function: $LAMBDA_NAME"
          
          # Explicitly trigger AWS Lambda code deployment with packaged ZIP artifact
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file "fileb://modules/lambda/lambda.zip"

      - name: Deploy Frontend Static Website Assets to AWS S3
        run: |
          cd infra
          BUCKET_NAME=$(terraform output -raw frontend_bucket_name)
          API_URL=$(terraform output -raw api_endpoint)
          FRONTEND_URL=$(terraform output -raw frontend_website_endpoint)
          LAMBDA_NAME=$(terraform output -raw lambda_function_name)
          
          echo "S3 Bucket Target: $BUCKET_NAME"
          echo "API Endpoint: $API_URL"
          echo "Frontend S3 URL: http://$FRONTEND_URL"

          # Inject real deployed API Gateway endpoint into frontend/js/config.js
          cat <<EOF > ../frontend/js/config.js
          /**
           * AlphaPass Global Frontend Configuration
           * Dynamically generated during CI/CD deployment
           */
          window.ALPHAPASS_API_URL = '$API_URL';
          EOF

          aws s3 sync ../frontend/ s3://$BUCKET_NAME --delete --cache-control "max-age=3600,public"

          # Output raw endpoints prominently to Workflow Step Summary & Action Notice
          echo "### 🚀 AlphaPass Deployment Outputs & Raw Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Platform S3 URL:** [http://$FRONTEND_URL](http://$FRONTEND_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **REST API Gateway Endpoint:** \`$API_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "- **AWS Lambda Backend Function:** \`$LAMBDA_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Hosting Bucket Target:** \`$BUCKET_NAME\`" >> $GITHUB_STEP_SUMMARY
          
          echo "::notice title=Deployment Raw Endpoints::Frontend: http://$FRONTEND_URL | API: $API_URL"


