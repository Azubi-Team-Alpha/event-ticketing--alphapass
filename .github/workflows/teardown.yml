name: AlphaPass Infrastructure Teardown

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "DESTROY" to confirm teardown of all AWS infrastructure'
        required: true
        default: 'NO'

jobs:
  teardown:
    name: 💥 Destroy AWS Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Verify Confirmation Input
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: Confirmation input did not match 'DESTROY'. Teardown aborted."
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup HashiCorp Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          cd infra
          terraform init

      - name: Terraform Destroy
        run: |
          cd infra
          terraform destroy -var="environment=dev" -auto-approve
