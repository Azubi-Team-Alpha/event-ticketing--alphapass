name: AlphaPass Infrastructure Teardown

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "DESTROY" to confirm teardown of all AWS infrastructure'
        required: true
        default: 'NO'

jobs:
  teardown:
    name: 💥 Destroy AWS Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Verify Confirmation Input
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: Confirmation input did not match 'DESTROY'. Teardown aborted."
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup HashiCorp Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          cd infra
          terraform init

      - name: Terraform Destroy (Automated Non-Interactive)
        continue-on-error: true
        run: |
          cd infra
          terraform destroy -var="environment=dev" -var="secret_key=${{ secrets.SECRET_KEY || 'alphapass-teardown-secret-key' }}" -auto-approve

      - name: AWS CLI Force Cleanup (Purge Any Orphaned Resources)
        run: |
          echo "=== Starting Complete AWS Resource Teardown & Purge ==="
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          ENV="dev"
          
          # 1. Delete S3 Bucket and all contents
          BUCKET_NAME="alphapass-frontend-${ENV}"
          if aws s3api head-bucket --bucket "$BUCKET_NAME" --region "$REGION" 2>/dev/null; then
            echo "Emptying and deleting S3 Bucket: $BUCKET_NAME"
            aws s3 rm "s3://$BUCKET_NAME" --recursive 2>/dev/null || true
            aws s3api delete-bucket --bucket "$BUCKET_NAME" --region "$REGION" 2>/dev/null || true
          fi

          # 2. Delete API Gateway REST APIs
          API_IDS=$(aws api-gateway get-rest-apis --region "$REGION" --query "items[?contains(name, 'alphapass-serverless-api')].id" --output text 2>/dev/null || true)
          for API_ID in $API_IDS; do
            if [ -n "$API_ID" ] && [ "$API_ID" != "None" ]; then
              echo "Deleting API Gateway REST API: $API_ID"
              aws api-gateway delete-rest-api --rest-api-id "$API_ID" --region "$REGION" 2>/dev/null || true
            fi
          done

          # 3. Delete Lambda Function
          LAMBDA_NAME="alphapass-backend-api-${ENV}"
          if aws lambda get-function --function-name "$LAMBDA_NAME" --region "$REGION" 2>/dev/null; then
            echo "Deleting Lambda Function: $LAMBDA_NAME"
            aws lambda delete-function --function-name "$LAMBDA_NAME" --region "$REGION" 2>/dev/null || true
          fi

          # 4. Delete CloudWatch Alarm & Log Group
          aws cloudwatch delete-alarms --alarm-names "alphapass-lambda-errors-${ENV}" --region "$REGION" 2>/dev/null || true
          aws logs delete-log-group --log-group-name "/aws/lambda/$LAMBDA_NAME" --region "$REGION" 2>/dev/null || true

          # 5. Delete SNS Topic
          TOPIC_ARN=$(aws sns list-topics --region "$REGION" --query "Topics[?contains(TopicArn, 'alphapass-notifications')].TopicArn" --output text 2>/dev/null || true)
          if [ -n "$TOPIC_ARN" ] && [ "$TOPIC_ARN" != "None" ]; then
            echo "Deleting SNS Topic: $TOPIC_ARN"
            aws sns delete-topic --topic-arn "$TOPIC_ARN" --region "$REGION" 2>/dev/null || true
          fi

          # 6. Delete DynamoDB Tables
          TABLES=$(aws dynamodb list-tables --region "$REGION" --query "TableNames[?starts_with(@, 'alphapass-')]" --output text 2>/dev/null || true)
          for TABLE in $TABLES; do
            if [ -n "$TABLE" ] && [ "$TABLE" != "None" ]; then
              echo "Deleting DynamoDB Table: $TABLE"
              aws dynamodb delete-table --table-name "$TABLE" --region "$REGION" 2>/dev/null || true
            fi
          done

          # 7. Delete IAM Role & Policy
          ROLE_NAME="alphapass-lambda-role-${ENV}"
          POLICY_NAME="alphapass-lambda-policy-${ENV}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || true)
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_NAME}"

          aws iam detach-role-policy --role-name "$ROLE_NAME" --policy-arn "$POLICY_ARN" 2>/dev/null || true
          aws iam delete-role --role-name "$ROLE_NAME" 2>/dev/null || true
          aws iam delete-policy --policy-arn "$POLICY_ARN" 2>/dev/null || true

          echo "=== AWS Resource Teardown Completed Successfully ==="

          echo "### 💥 AlphaPass Infrastructure Teardown Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** All AWS infrastructure resources (\`alphapass-*-dev\`) have been completely destroyed." >> $GITHUB_STEP_SUMMARY
          echo "- **Destroyed Resources:** S3 Bucket, API Gateway, Lambda Function, DynamoDB Tables, SNS Topics, CloudWatch Alarms & IAM Roles." >> $GITHUB_STEP_SUMMARY
          echo "::notice title=Teardown Completed::All AlphaPass AWS resources destroyed successfully."
