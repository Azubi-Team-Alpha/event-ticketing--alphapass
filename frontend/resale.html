<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Resale Ticket Exchange - AlphaPass</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>

    <!-- Topbar Start -->
    <div class="container-fluid px-5 d-none border-bottom d-lg-block">
        <div class="row gx-0 align-items-center">
            <div class="col-lg-6 text-start">
                <a href="index.html" class="navbar-brand p-0">
                    <h1 class="display-6 text-primary m-0"><i class="fas fa-ticket-alt text-primary me-2"></i>AlphaPass</h1>
                </a>
            </div>
            <div class="col-lg-6 text-end">
                <a href="events.html" class="btn btn-outline-primary rounded-pill px-4 me-2">Primary Events</a>
                <a href="wallet.html" class="btn btn-primary rounded-pill px-4">My Wallet</a>
            </div>
        </div>
    </div>

    <!-- Header Banner -->
    <div class="container-fluid bg-primary py-4 mb-4 text-white">
        <div class="container py-2">
            <span class="badge bg-warning text-dark px-3 py-2 rounded-pill text-uppercase mb-2 fw-bold">Official Secondary Market</span>
            <h1 class="display-5 text-white fw-bold">Verified Ticket Resale Exchange</h1>
            <p class="mb-0 text-white-50">Buy verified secondary tickets from fellow attendees. Price markups are capped to prevent scalping.</p>
        </div>
    </div>

    <!-- Resale Listings Grid -->
    <div class="container-fluid py-4">
        <div class="container">
            <div class="row g-4" id="resaleGrid">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Buy Resale Modal -->
    <div class="modal fade" id="buyResaleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-3">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-header-title text-white fw-bold"><i class="fa fa-shopping-cart me-2"></i> Purchase Resale Ticket</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="buyResaleForm">
                    <div class="modal-body p-4">
                        <div class="alert alert-light border mb-3">
                            <div class="fw-bold text-dark" id="modalResaleEvent">Event Title</div>
                            <div class="small text-muted" id="modalResalePrice">Price: ₵0.00</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Your Full Name *</label>
                            <input type="text" id="buyerName" class="form-control" placeholder="Buyer Name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Your Email Address *</label>
                            <input type="email" id="buyerEmail" class="form-control" placeholder="buyer@example.com" required>
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary rounded-pill fw-bold px-4">Buy & Claim Pass</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark text-white-50 footer pt-4 mt-5">
        <div class="container py-3 text-center">
            <p class="mb-0">&copy; AlphaPass Verified Resale Exchange Engine.</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app-api.js"></script>

    <script>
        let selectedListing = null;

        async function loadResaleListings() {
            const grid = document.getElementById('resaleGrid');
            try {
                const listings = await apiFetch('/resale/listings');
                if (!listings || listings.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">No active resale listings at the moment.</div>';
                    return;
                }

                grid.innerHTML = listings.map(l => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100 border-0 shadow-sm rounded-3 overflow-hidden">
                            <div class="bg-primary text-white p-3 d-flex justify-content-between align-items-center">
                                <span class="badge bg-warning text-dark fw-bold">VERIFIED RESALE</span>
                                <code>${l.ticket_code || l.ticket_id || 'RESALE-PASS'}</code>
                            </div>
                            <div class="card-body p-4 d-flex flex-column">
                                <h5 class="fw-bold text-dark mb-2">${l.event_title || 'Verified Event Pass'}</h5>
                                <div class="text-muted small mb-3">Seller: ${l.seller_email || l.seller_name || 'Verified Seller'}</div>
                                
                                <div class="d-flex justify-content-between align-items-center my-3 p-3 bg-light rounded">
                                    <div>
                                        <small class="text-muted d-block">Original</small>
                                        <span class="text-decoration-line-through text-muted">₵${parseFloat(l.face_value || l.original_price || 0).toFixed(2)}</span>
                                    </div>
                                    <div class="text-end">
                                        <small class="text-muted d-block">Resale Asking</small>
                                        <span class="fs-4 fw-bold text-primary">₵${parseFloat(l.asking_price || 0).toFixed(2)}</span>
                                    </div>
                                </div>

                                <button class="btn btn-warning text-dark rounded-pill w-100 mt-auto py-2 fw-bold" onclick="openBuyModal('${l.id || l.listing_id}', '${l.event_title || 'Event Pass'}', ${l.asking_price})"><i class="fa fa-bolt me-1"></i> Buy Resale Pass</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">Failed to load resale listings.</div>';
            }
        }

        function openBuyModal(id, title, price) {
            selectedListing = { id, title, price };
            document.getElementById('modalResaleEvent').textContent = title;
            document.getElementById('modalResalePrice').textContent = `Price: ₵${parseFloat(price).toFixed(2)}`;
            const modal = new bootstrap.Modal(document.getElementById('buyResaleModal'));
            modal.show();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadResaleListings();

            document.getElementById('buyResaleForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!selectedListing) return;
                const name = document.getElementById('buyerName').value.trim();
                const email = document.getElementById('buyerEmail').value.trim();

                try {
                    // Correct endpoint: POST /resale/{listing_id}/purchase
                    await apiFetch(`/resale/${selectedListing.id}/purchase`, {
                        method: 'POST',
                        body: JSON.stringify({ buyer_name: name, buyer_email: email })
                    });
                    bootstrap.Modal.getInstance(document.getElementById('buyResaleModal')).hide();
                    showToast('Resale pass purchased! Redirecting to your wallet…', 'success');
                    // Redirect to wallet so buyer can see and download their ticket
                    setTimeout(() => {
                        window.location.href = `wallet.html?email=${encodeURIComponent(email)}`;
                    }, 1800);
                } catch (err) {
                    showToast('Purchase failed: ' + err.message, 'danger');
                }
            });
        });
    </script>
</body>

</html>
