services:
  db:
    image: postgres:15-alpine
    container_name: ticket-hub-db
    environment:
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: localpassword123
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbadmin -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-hub-backend
    environment:
      DATABASE_URL: postgresql://dbadmin:localpassword123@db:5432/appdb
      SECRET_KEY: my-local-dev-secret-key
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: ticket-hub-dev
      SES_SENDER_EMAIL: noreply@ticket-hub.com
      DEBUG: "true"
      PLATFORM_COMMISSION_PERCENT: "5.0"
      REQUIRE_EVENT_APPROVAL: "false"
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-hub-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
